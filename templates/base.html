<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Control Panel - NOC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .navbar {
            background: #16213e;
            padding: 1rem 2rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            border-bottom: 2px solid #0f3460;
        }
        .navbar a {
            color: #e94560;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .navbar a:hover { color: #fff; }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .card {
            background: #16213e;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #0f3460;
        }
        .btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            margin: 0.2rem;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: #c13651; }
        .btn-secondary { background: #0f3460; }
        .btn-success { background: #16c79a; }
        .btn-danger { background: #c13651; }
        input, select {
            padding: 0.5rem;
            border-radius: 5px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #fff;
            margin: 0.2rem;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .status-online { color: #16c79a; }
        .status-offline { color: #e94560; }
        .hint { color: #888; font-size: 0.85rem; margin-top: 0.3rem; }
        .log-box {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 1rem;
            font-family: monospace;
            max-height: 220px;
            overflow-y: auto;
            margin-top: 1rem;
            white-space: pre-wrap;
            font-size: 0.9rem;
        }
        .log-sticky {
            position: sticky;
            bottom: 0;
            z-index: 100;
            background: #1a1a2e;
            padding-top: 0.5rem;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        #status-line {
            color: #16c79a;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            min-height: 1.2em;
        }
        h1, h2 { color: #e94560; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.3rem; color: #aaa; }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body {
            padding: 1rem 1.25rem;
            overflow-y: auto;
            flex: 1;
        }
        .pkg-item {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #0f3460;
        }
        .pkg-name {
            flex: 1;
            min-width: 180px;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
        }
        .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
        .remote-grid {
            display: inline-grid;
            grid-template-columns: repeat(3, 64px);
            gap: 8px 6px;
            justify-content: center;
            margin: 0.2rem 0;
        }
        .btn-remote {
            width: 58px;
            height: 48px;
            padding: 0;
            font-size: 1.2rem;
            line-height: 48px;
            text-align: center;
            border-radius: 10px;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-remote:hover { background: #1a4a7a; border-color: #e94560; transform: scale(1.05); }
        .btn-ok {
            background: #16c79a;
            border-color: #1ae0a8;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .btn-ok:hover { background: #13b389; }
        .btn-vol {
            background: #1a1a2e;
            border-color: #555;
            font-size: 1.1rem;
        }
        .btn-vol:hover { background: #333; border-color: #e94560; }
    </style>
    <script>
        function log(message, type) {
            const box = document.getElementById('log-box');
            const status = document.getElementById('status-line');
            const prefix = type === 'ok' ? '✅ ' : type === 'err' ? '❌ ' : type === 'wait' ? '⏳ ' : '• ';
            const line = `[${new Date().toLocaleTimeString()}] ${prefix}${message}`;
            if (box) {
                box.textContent += line + '\n';
                box.scrollTop = box.scrollHeight;
            }
            if (status) {
                status.textContent = line;
                status.style.color = type === 'err' ? '#e94560' : type === 'ok' ? '#16c79a' : '#eee';
            }
            console.log(line);
        }

        function formatApiMessage(data) {
            if (!data) return 'Sin respuesta del servidor';
            let msg = data.message || data.error || '';
            if (data.packages && data.count !== undefined) msg = data.message || `${data.count} apps IPK`;
            else if (data.apps && data.count !== undefined) msg = data.message || `${data.count} apps LG`;
            else if (data.linked === true) msg = data.message || 'TV vinculada con ares';
            else if (!msg && data.success === true) msg = 'Operación correcta';
            else if (!msg && data.result === 'ok') msg = 'OK';
            else if (data.added !== undefined) msg = `Escaneo: ${data.added} TV(s) nuevas`;
            else if (!msg && data.success === false) msg = 'Error (revisa detalle abajo)';
            if (!msg) msg = JSON.stringify(data).slice(0, 400);
            return String(msg).replace(/\s+/g, ' ').trim().slice(0, 350);
        }

        async function apiCall(url, options = {}, label) {
            if (label) log(label + '…', 'wait');
            const isForm = options.body instanceof FormData;
            const headers = isForm ? {} : { 'Content-Type': 'application/json' };
            try {
                const res = await fetch(url, { ...options, headers: { ...headers, ...options.headers } });
                const ct = res.headers.get('content-type') || '';
                if (ct.includes('application/json')) {
                    const data = await res.json();
                    const msg = formatApiMessage(data);
                    const ok = data.success !== false && res.ok && data.result !== 'error';
                    log(msg, ok ? 'ok' : 'err');
                    return data;
                }
                const txt = res.ok ? 'OK' : 'Error HTTP ' + res.status;
                log(txt, res.ok ? 'ok' : 'err');
                return { success: res.ok, message: txt };
            } catch (e) {
                log('Error de red: ' + e.message, 'err');
                return { success: false, message: e.message };
            }
        }


        function openRemoteModal(ip) {
            const el = document.getElementById('remote-modal-' + ip);
            if (el) el.classList.add('open');
        }

        function closeRemoteModal(ip) {
            const el = document.getElementById('remote-modal-' + ip);
            if (el) el.classList.remove('open');
        }

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                e.target.classList.remove('open');
            }
        });
    </script>
</head>
<body>
    <nav class="navbar">
        <a href="/">🏠 Inicio / Dispositivos</a>
        {% for ct in connection_types %}
        <a href="{{ ct.route }}">{{ ct.icon }} {{ ct.display_name }}</a>
        {% endfor %}
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div class="container log-sticky">
        <div class="card">
            <h3>📋 Log (siempre visible abajo)</h3>
            <div id="status-line">Listo — pulsa un botón y verás el resultado aquí</div>
            <div id="log-box" class="log-box">Listo para operaciones...\n</div>
        </div>
    </div>
</body>
</html>
